<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>寿司タイピング</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <main>
    <header>
      <h1>寿司タイピング</h1>
    </header>

    <section id="game">
      <div id="stage">
        <div id="track"></div>

        <!-- 寿司だけを動かすラッパー -->
        <div id="sushi-wrapper">
          <img id="sushi-img"
               src="images/sushineta.jpeg"
               srcset="images/sushineta.jpeg 1x"
               width="200" height="150"
               alt="寿司ネタ">
        </div>

        <!-- 重要: 単語表示は sushi-wrapper の外に置く -->
        <div id="word"><span class="target"></span></div>
      </div>

      <div id="hud">
        <div id="score">スコア: 0</div>
        <div id="timer">残り時間: 60</div>
      </div>

      <div id="controls">
        <input id="input" type="text" autocomplete="off" autocapitalize="off" autocorrect="off" spellcheck="false" placeholder="ここに入力">
      </div>
    </section>
  </main>

  <script src="js/main.js"></script>
</body>
</html>
