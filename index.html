<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>寿司タイピング（自作）</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header>
    <h1>寿司タイピング（自作）</h1>
    <div id="hud">
      <div id="score">スコア: 0</div>
      <div id="timer">残り時間: 60</div>
    </div>
  </header>

  <main>
    <div id="stage">
      <div id="track"></div>
      <div id="sushi-wrapper">
  <img id="sushi-img"
       src="images/sushineta.jpeg"
       srcset="images/sushineta.jpeg 1x, images/sushineta@2x.jpeg 2x"
       width="140" height="105"
       alt="寿司ネタ">
        <div id="word"><span class="target"></span></div>
      </div>
    </div>

    <div id="controls">
      <input id="input" type="text" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" placeholder="タイプしてね">
    </div>
  </main>

  <script src="js/main.js"></script>
</body>
</html>
